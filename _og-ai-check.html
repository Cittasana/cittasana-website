<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1200px; height:630px; overflow:hidden;
  font-family:'Georgia','Times New Roman',serif;
  background:#0d0d12; color:#e8e6f0; }
.bg { position:absolute; inset:0; background:#0d0d12; }
.glow { position:absolute; border-radius:50%; }
.grid { position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:60px 60px; }
.frame { position:absolute; inset:32px; border:1px solid rgba(255,255,255,0.08); }
.accent-bar { position:absolute; left:0; top:0; width:4px; height:100%;
  background:linear-gradient(to bottom,#f59e0b 0%,rgba(245,158,11,0.2) 60%,transparent 100%); }
.content { position:relative; z-index:10; display:flex; flex-direction:column;
  height:100%; padding:64px 80px; }
.top { display:flex; align-items:center; justify-content:space-between; margin-bottom:auto; }
.brand { font-style:italic; font-size:22px; font-weight:700; letter-spacing:-0.5px;
  color:rgba(232,230,240,0.7); }
.tag { font-family:Arial,sans-serif; font-size:11px; font-weight:800;
  text-transform:uppercase; letter-spacing:0.18em; color:#f59e0b;
  background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.22);
  padding:6px 14px; }
.headline { font-size:88px; font-weight:300; line-height:0.92; letter-spacing:-3px;
  color:#e8e6f0; margin-bottom:24px; }
.headline em { font-style:italic; color:#f59e0b; }
.sub { font-family:Arial,sans-serif; font-size:19px; font-weight:400;
  color:rgba(232,230,240,0.55); line-height:1.5; max-width:600px; }
.bottom { display:flex; align-items:flex-end; justify-content:space-between; margin-top:auto; }
.pills { display:flex; gap:20px; flex-wrap:wrap; }
.pill { font-family:Arial,sans-serif; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.1em;
  color:rgba(232,230,240,0.4); display:flex; align-items:center; gap:6px; }
.pill::before { content:'—'; color:#f59e0b; }
.badge { text-align:right; }
.badge-label { font-family:Arial,sans-serif; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.15em; color:rgba(232,230,240,0.35);
  margin-bottom:4px; }
.badge-main { font-size:42px; font-weight:300; color:#e8e6f0; letter-spacing:-1px; }
.badge-sub { font-family:Arial,sans-serif; font-size:12px;
  color:rgba(232,230,240,0.4); margin-top:2px; }
</style></head>
<body>
  <div class="bg"></div>
  
          <div class="glow" style="top:50%;left:50%;transform:translate(-50%,-55%);
            width:700px;height:500px;
            background:radial-gradient(circle,rgba(245,158,11,0.09) 0%,transparent 70%);filter:blur(60px);"></div>
        
  <div class="grid"></div>
  <div class="frame"></div>
  <div class="accent-bar"></div>
  <div class="content">
    <div class="top">
      <span class="brand">Cittasana AI</span>
      <span class="tag">Kostenlos · Kein Pitch</span>
    </div>
    <div style="margin-bottom:48px">
      <div class="headline">AI-Ready-<br/>Check.<br/><em>Gratis.</em></div>
      <p class="sub">20 Minuten Gespräch. Konkreter Umsetzungsplan. Wir zeigen wo KI sofort Geld spart — ohne Kaufverpflichtung.</p>
    </div>
    <div class="bottom">
      <div class="pills"><span class="pill">20 Min. Gespräch</span><span class="pill">Live-Demo</span><span class="pill">ROI-Kalkulation</span><span class="pill">Sofort umsetzbar</span></div>
      <div class="badge">
        <div class="badge-label">nur</div>
        <div class="badge-main">5 Plätze</div>
        <div class="badge-sub">pro Monat verfügbar</div>
      </div>
    </div>
  </div>
</body></html>
