<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #0d0d12;
    color: #e8e6f0;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: #0d0d12;
  }

  /* Amber glow blobs */
  .glow-1 {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.13) 0%, transparent 70%);
    filter: blur(40px);
  }
  .glow-2 {
    position: absolute;
    bottom: -100px;
    right: -60px;
    width: 600px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    filter: blur(60px);
  }

  /* Grid lines (subtle) */
  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Border frame */
  .frame {
    position: absolute;
    inset: 32px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 64px 80px;
  }

  /* Top row: logo + tag */
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: auto;
  }

  .brand {
    font-style: italic;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: rgba(232,230,240,0.7);
  }

  .tag {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #f59e0b;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.22);
    padding: 6px 14px;
  }

  /* Main content */
  .main {
    margin-bottom: 56px;
  }

  .product-name {
    font-size: 100px;
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -3px;
    color: #e8e6f0;
    margin-bottom: 24px;
  }

  .product-name em {
    font-style: italic;
    color: #f59e0b;
  }

  .tagline {
    font-family: 'Arial', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: rgba(232,230,240,0.55);
    letter-spacing: 0.01em;
    line-height: 1.5;
    max-width: 580px;
  }

  /* Bottom row: features + price */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .features {
    display: flex;
    gap: 28px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(232,230,240,0.45);
  }

  .feature::before {
    content: '—';
    color: #f59e0b;
  }

  .price-box {
    text-align: right;
  }

  .price-label {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(232,230,240,0.35);
    margin-bottom: 4px;
  }

  .price {
    font-size: 42px;
    font-weight: 300;
    color: #e8e6f0;
    letter-spacing: -1px;
  }

  .price-sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: rgba(232,230,240,0.4);
    margin-top: 2px;
  }

  /* Amber accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(to bottom, #f59e0b 0%, rgba(245,158,11,0.2) 60%, transparent 100%);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid-lines"></div>
  <div class="frame"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="top-row">
      <span class="brand">Cittasana AI</span>
      <span class="tag">Eigenes Produkt-IP · Kein Make.com</span>
    </div>

    <div class="main">
      <div class="product-name">HiveMind.<br/><em>Ihr Firmenwissen.</em></div>
      <p class="tagline">Dokumente, Slack, E-Mails & Meetings — ein KI-Assistent, der den gesamten Kontext Ihres Unternehmens kennt.</p>
    </div>

    <div class="bottom-row">
      <div class="features">
        <span class="feature">Semantische Suche</span>
        <span class="feature">Auto-Connectors</span>
        <span class="feature">DSGVO-konform</span>
        <span class="feature">EU-Server</span>
      </div>
      <div class="price-box">
        <div class="price-label">Ab</div>
        <div class="price">€149 / Monat</div>
        <div class="price-sub">monatlich kündbar</div>
      </div>
    </div>
  </div>
</body>
</html>
